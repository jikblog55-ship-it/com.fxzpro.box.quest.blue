<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>reshponshiv</title>
</head>
<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
  }
  html,body{
    width:100%;
    height:100%;
  }
  #main{
    display:flex;
    width:100%;
    height:100%;
    background-color:red;
  }
  #left{
    width:40%;
    height:100%;
    background:yellow;
    
  }
  #right{
    width:60%;
    height:100%;
    background:white;
  }
  #rtop{
    display:flex;
    width:100%;
    height:50%;
    background:#0081a7;
  }
  #rbottom{
    width:100%;
    height:50%;
    background:lightblue;
  }
  #r-left{
    width:55%;
    height:100%;
    background:blue;
  }
  #r-right{
    width:45%;
    height:100%;
    background:lightpink;
  }
</style>
<body>
  <div id="main">
    <div id="left"></div>
    <div id="right">
      <div id="rtop">
        <div id="r-left"></div>
        <div id="r-right"></div>
      </div>
      <div id="rbottom"></div>
    </div>
  </div>
</body>

</html>
